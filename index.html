<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>在庫管理（介護施設消耗品）</title>
  <style>
    :root {
      --header-bg: #1e3a5f;
      --header-fg: #f5f7fa;
      --header-h: 72px;
      --tabs-h: 52px;
      --accent: #2563b8;
      --border: #cbd5e1;
      --bg: #f1f5f9;
      --card: #fff;
      --text: #0f172a;
      --muted: #64748b;
      --danger: #b91c1c;
      --warn: #a16207;
      --ok: #334155;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.45;
    }
    .app-header {
      background: var(--header-bg);
      color: var(--header-fg);
      padding: 0.9rem 1rem 0.8rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      min-height: var(--header-h);
      z-index: 100;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .app-header h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.15rem 0; }
    .app-header .sub { font-size: 0.8rem; opacity: 0.9; }
    .tabs {
      display: flex;
      gap: 0;
      background: #0f172a;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      min-height: var(--tabs-h);
      z-index: 99;
    }
    .tab-btn {
      flex: 1;
      min-width: 4.5rem;
      padding: 0.85rem 0.5rem 0.75rem;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.2;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { color: #fff; border-bottom-color: #38bdf8; background: rgba(255,255,255,.06); }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.75rem;
      padding-top: calc(var(--header-h) + var(--tabs-h) + 0.75rem);
      padding-bottom: 2.5rem;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.75rem;
    }
    h2, h3 { font-size: 1.1rem; margin: 0 0 0.5rem; color: #0f172a; }
    h3 { font-size: 1rem; margin-top: 0.75rem; }
    .row-flex { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 0.75rem; margin-bottom: 0.5rem; }
    label { font-size: 0.95rem; color: var(--muted); }
    input, select, textarea {
      padding: 0.45rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1.05rem;
      max-width: 100%;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.25rem;
      padding: 0.5rem 0.9rem; font-size: 1rem; font-weight: 500;
      border: none; border-radius: 4px; cursor: pointer; background: var(--accent); color: #fff;
    }
    .btn-lg { padding: 0.72rem 1.4rem; font-size: 1.05rem; font-weight: 700; }
    .btn-secondary { background: #475569; }
    .btn-ghost { background: #e2e8f0; color: #0f172a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0.5rem 0; }
    table { width: 100%; border-collapse: collapse; font-size: 1rem; }
    th, td {
      border: 1px solid var(--border);
      padding: 0.52rem 0.45rem;
      text-align: center; vertical-align: middle;
    }
    th { background: #e2e8f0; font-weight: 600; white-space: nowrap; }
    tr:nth-child(even) td { background: #fafbfc; }
    .num { text-align: center; font-variant-numeric: tabular-nums; }
    .col-west { background: #f0f7ff; }
    .col-south { background: #fff8f0; }
    .col-soko { background: #f0fdf4; }
    th.col-divide { box-shadow: inset 3px 0 0 #94a3b8; }
    .badge {
      display: inline-block; padding: 0.15rem 0.4rem; border-radius: 4px;
      font-size: 0.85rem; font-weight: 600; white-space: nowrap;
    }
    .badge-danger { background: #fecaca; color: var(--danger); }
    .badge-warn { background: #fef08a; color: var(--warn); }
    .badge-ok { background: #e2e8f0; color: var(--ok); }
    .badge-ship { background: #dbeafe; color: #1d4ed8; }
    .meta-line { font-size: 0.95rem; color: var(--muted); margin: 0.25rem 0; }
    .error-msg { color: var(--danger); font-size: 0.95rem; }
    .ok-msg { color: #166534; font-size: 0.95rem; }
    .section-title { display: flex; align-items: center; gap: 0.5rem; margin: 0.4rem 0; }
    .slist { list-style: none; margin: 0.25rem 0 0.75rem; padding: 0; }
    .slist li { display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem; margin: 0.2rem 0; }
    .slist .nm { flex: 1; min-width: 6rem; }
    .slist-head { display: flex; align-items: center; gap: 0.35rem; margin: 0.2rem 0; font-size: 0.88rem; color: var(--muted); }
    .slist-head .nm { flex: 1; min-width: 6rem; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1 id="facilityTitle">在庫管理</h1>
    <div class="sub" id="facilitySub">介護施設 消耗品</div>
  </header>
  <nav class="tabs" role="tablist">
    <button type="button" class="tab-btn active" data-tab="honbu" role="tab">本部</button>
    <button type="button" class="tab-btn" data-tab="nishi" role="tab">西</button>
    <button type="button" class="tab-btn" data-tab="settei" role="tab">設定</button>
  </nav>
  <main class="wrap">
    <section class="panel active" data-panel="honbu" id="panel-honbu">
      <div class="card">
        <div class="row-flex" style="justify-content: space-between; align-items: flex-end;">
          <div>
            <label for="global-sender">操作者名（GAS送信用）</label><br />
            <input type="text" id="global-sender" placeholder="必ず入力" />
          </div>
          <button type="button" class="btn" id="btn-sync-get">最新データを取得</button>
        </div>
        <p class="meta-line" id="honbu-stamp">最終更新: なし</p>
        <p class="meta-line" id="honbu-info"></p>
        <p class="error-msg" id="honbu-err" hidden></p>
        <div class="section-title"><h2>パット類</h2></div>
        <div class="table-wrap">
          <table id="honbu-pat">
            <thead>
              <tr>
                <th>品目</th>
                <th class="col-west">西在庫</th>
                <th class="col-west">西消費</th>
                <th class="col-west">西補充(入力)</th>
                <th class="col-south col-divide">南消費</th>
                <th class="col-soko">倉庫在庫</th>
                <th class="col-soko">倉庫補充(入力)</th>
                <th>確認</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="honbu-pat-tbody"></tbody>
          </table>
        </div>
        <div class="section-title"><h2>日用品</h2></div>
        <div class="table-wrap">
          <table id="honbu-daily">
            <thead>
              <tr>
                <th>品目</th>
                <th class="col-west">西発注数</th>
                <th class="col-west">発注日</th>
                <th>納品数(入力)</th>
                <th class="col-south col-divide">南卸数(入力)</th>
                <th class="col-soko">倉庫在庫</th>
                <th class="col-soko">倉庫補充(入力)</th>
                <th>確認</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="honbu-daily-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel" data-panel="nishi" id="panel-nishi">
      <div class="card">
        <div class="row-flex">
          <div>
            <label>集計期間（週：月曜〜日曜）</label><br />
            <div>
              <button type="button" class="btn btn-ghost" id="n-week-prev" title="前週">◀</button>
              <span id="n-week-label" style="min-width: 12rem; text-align: center; display: inline-block;"></span>
              <button type="button" class="btn btn-ghost" id="n-week-next" title="次週">▶</button>
            </div>
          </div>
        </div>
        <div class="section-title"><h2>パット類</h2></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>品目</th>
                <th>西消費(自動)</th>
                <th>西在庫</th>
                <th>西補充</th>
                <th>受取</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="n-pat-tbody"></tbody>
          </table>
        </div>
        <div class="section-title"><h2>日用品</h2></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>品目</th>
                <th>発注数</th>
                <th>発注日</th>
                <th>操作</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="n-daily-tbody"></tbody>
          </table>
        </div>
        <div style="display:flex;justify-content:center;margin-top:1rem;">
          <button type="button" class="btn btn-lg" id="n-order-all">一括発注を送信</button>
        </div>
      </div>
    </section>

    <section class="panel" data-panel="settei" id="panel-settei">
      <div class="card" id="settings-root"></div>
    </section>
  </main>

  <script>
(function () {
  'use strict';

  var DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxrvIwntBwCFnVmH5pGwVMMZL1Petm3CeiOT3SdB3cdGNNq6dZRpJRHLZnQEYpom2ApqQ/exec';
  var DEFAULT_TOKEN = 'KAIGO_ZAIKO_2025';
  var LS_GAS_URL = 'zaiko_gas_url';
  var LS_GAS_TOKEN = 'zaiko_gas_token';
  var LS_POST_ALERT_DEBUG = 'zaiko_post_alert_debug';
  var gasUrl = DEFAULT_GAS_URL;
  var token = DEFAULT_TOKEN;
  var LS_KEY = 'zaiko_db';
  var LS_KAIGO_NISHI = 'kaigo_nishi';
  var LS_KAIGO_MINAMI = 'kaigo_minami';
  var GAS_DEBUG = true;
  function loadGasEndpoints() {
    try {
      var u = localStorage.getItem(LS_GAS_URL);
      var t = localStorage.getItem(LS_GAS_TOKEN);
      gasUrl = (u != null && String(u).trim() !== '') ? String(u).trim() : DEFAULT_GAS_URL;
      token = (t != null && String(t).trim() !== '') ? String(t).trim() : DEFAULT_TOKEN;
    } catch (e) {
      gasUrl = DEFAULT_GAS_URL;
      token = DEFAULT_TOKEN;
    }
  }
  function saveGasEndpoints() {
    var uEl = document.getElementById('s-gas-url');
    var tEl = document.getElementById('s-gas-token');
    var u = uEl ? String(uEl.value || '').trim() : '';
    var tok = tEl ? String(tEl.value || '').trim() : '';
    gasUrl = u !== '' ? u : DEFAULT_GAS_URL;
    token = tok !== '' ? tok : DEFAULT_TOKEN;
    try {
      localStorage.setItem(LS_GAS_URL, gasUrl);
      localStorage.setItem(LS_GAS_TOKEN, token);
    } catch (e) {}
    if (uEl) uEl.value = gasUrl;
    if (tEl) tEl.value = token;
  }
  loadGasEndpoints();
  function isPostAlertDebugOn() {
    try { return localStorage.getItem(LS_POST_ALERT_DEBUG) === '1'; } catch (e) { return false; }
  }
  function gasLog(label, a, b) {
    if (!GAS_DEBUG) return;
    if (b !== undefined) {
      console.log('[GAS ZAIKO]', label, a, b);
    } else {
      console.log('[GAS ZAIKO]', label, a);
    }
  }

  var DEFAULT_DAILY = [
    'ペーパータオル', 'トイレットペーパー', '箱なしティッシュ',
    'プラスチックグローブ(M)', 'プラスチックグローブ(L)', 'マスク',
    '洗濯用洗剤', 'ワイドハイター', 'オフロの洗剤4L', 'トイレ洗剤4L',
    'ワンダフル(食器用洗剤)5kg', 'キッチンブリーチ5kg', '石鹸',
    '次亜塩素酸水', 'フローリングシート', '泡ハンドソープ(キレイキレイ)4L',
    '液体ハンドソープ(キレイキレイ)4L', 'リンスインシャンプー',
    'トイレハイター', 'ゴミ袋45L', 'イージーバックS', 'イージーバックLL'
  ];

  function toJSTDateString(dateStr) {
    if (!dateStr) return '';
    var jst = new Date(new Date(dateStr).getTime() + 9 * 60 * 60 * 1000);
    if (isNaN(jst.getTime())) return '';
    return jst.toISOString().slice(0, 10);
  }

  function getMonday(d) {
    var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    var w = (x.getDay() + 6) % 7;
    x.setDate(x.getDate() - w);
    return x;
  }

  function addDays(d, n) {
    var x = new Date(d.getTime());
    x.setDate(x.getDate() + n);
    return x;
  }

  function ymd(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function inWeekJST(supplyDateStr, monday) {
    return toJSTDateString(supplyDateStr) >= ymd(monday) && toJSTDateString(supplyDateStr) <= ymd(addDays(monday, 6));
  }

  function getKaigoSupplies(ls) {
    try {
      var raw = localStorage.getItem(ls);
      if (!raw) return [];
      var j = JSON.parse(raw);
      var a = (j && j.db && j.db.supplies) || (j && j.db && j.db.supply) || j.supplies;
      if (!a && j && j.supply) a = j.supply;
      return Array.isArray(a) ? a : [];
    } catch (e) { return []; }
  }

  function sumSuppliesInWeek(ls, productNames, monday) {
    var set = {};
    for (var i = 0; i < productNames.length; i++) set[productNames[i]] = 0;
    var list = getKaigoSupplies(ls);
    for (var k = 0; k < list.length; k++) {
      var s = list[k];
      if (!s) continue;
      if (!inWeekJST(s.date, monday)) continue;
      var p = s.product != null ? String(s.product) : '';
      if (set[p] === undefined) continue;
      var q = parseFloat(s.qty);
      if (isNaN(q)) q = 0;
      set[p] += q;
    }
    return set;
  }

  function sumSuppliesAllTime(ls, productNames) {
    var o = {};
    for (var i = 0; i < productNames.length; i++) o[productNames[i]] = 0;
    var list = getKaigoSupplies(ls);
    for (var k = 0; k < list.length; k++) {
      var s = list[k];
      if (!s || !s.date) continue;
      if (!toJSTDateString(s.date)) continue;
      var p = s.product != null ? String(s.product) : '';
      if (o[p] === undefined) continue;
      var q = parseFloat(s.qty);
      if (isNaN(q)) q = 0;
      o[p] += q;
    }
    return o;
  }

  function escapeAttr(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;');
  }
  function escapeText(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;');
  }

  function defStockRow() { return { initial: 0, warnAt: 10, dangerAt: 5 }; }
  function defSupplyRow() {
    return {
      nishiConsumedAuto: 0,
      nishiReplenish: 0,
      nishiReplenishTotal: 0,
      minamiConsumedAuto: 0,
      sokoReplenish: 0,
      sokoReplenishTotal: 0
    };
  }
  function defDailyRow() {
    return {
      nishiOrder: 0,
      nishiOrderDate: '',
      deliveryCount: 0,
      deliveryTotal: 0,
      minamiIssued: 0,
      minamiIssuedTotal: 0,
      sokoReplenish: 0,
      sokoReplenishTotal: 0
    };
  }

  function defaultDb() {
    return {
      settings: {
        facilityName: '○○通所介護',
        supplyProducts: [],
        dailyProducts: DEFAULT_DAILY.slice(),
        nishiStock: {},
        sokoStock: {}
      },
      supply: {},
      daily: {},
      lastSynced: '',
      lastSyncedBy: ''
    };
  }

  function migrateDb(raw) {
    if (!raw || typeof raw !== 'object') return defaultDb();
    var o = defaultDb();
    if (raw.settings) {
      o.settings.facilityName = raw.settings.facilityName != null ? String(raw.settings.facilityName) : o.settings.facilityName;
      o.settings.supplyProducts = Array.isArray(raw.settings.supplyProducts) ? raw.settings.supplyProducts.map(String) : [];
      o.settings.dailyProducts = (Array.isArray(raw.settings.dailyProducts) && raw.settings.dailyProducts.length)
        ? raw.settings.dailyProducts.map(String) : o.settings.dailyProducts;
      o.settings.nishiStock = raw.settings.nishiStock && typeof raw.settings.nishiStock === 'object' ? raw.settings.nishiStock : {};
      o.settings.sokoStock = raw.settings.sokoStock && typeof raw.settings.sokoStock === 'object' ? raw.settings.sokoStock : {};
    }
    o.supply = raw.supply && typeof raw.supply === 'object' ? raw.supply : {};
    o.daily = raw.daily && typeof raw.daily === 'object' ? raw.daily : {};
    o.lastSynced = raw.lastSynced != null ? String(raw.lastSynced) : '';
    o.lastSyncedBy = raw.lastSyncedBy != null ? String(raw.lastSyncedBy) : '';
    if (!o.settings.dailyProducts.length) o.settings.dailyProducts = DEFAULT_DAILY.slice();
    return o;
  }

  function loadDb() {
    try {
      var t = localStorage.getItem(LS_KEY);
      if (t) return migrateDb(JSON.parse(t));
    } catch (e) {}
    return defaultDb();
  }

  var db = loadDb();
  var weekMonday = getMonday(new Date());
  if (!localStorage.getItem('zaiko_week_mon')) {
    try { localStorage.setItem('zaiko_week_mon', ymd(weekMonday)); } catch (e) {}
  } else {
    try {
      var ps = localStorage.getItem('zaiko_week_mon').split('-');
      weekMonday = new Date(parseInt(ps[0], 10), parseInt(ps[1], 10) - 1, parseInt(ps[2], 10));
    } catch (e) {}
  }

  function saveDb() {
    localStorage.setItem(LS_KEY, JSON.stringify(db));
  }

  function getSender() {
    var e = document.getElementById('global-sender');
    return (e && e.value || '').trim();
  }

  function ensureProductRows() {
    if (!db.settings || typeof db.settings !== 'object') db.settings = {};
    if (!Array.isArray(db.settings.supplyProducts)) db.settings.supplyProducts = [];
    if (!Array.isArray(db.settings.dailyProducts)) db.settings.dailyProducts = [];
    if (!db.settings.sokoStock || typeof db.settings.sokoStock !== 'object') db.settings.sokoStock = {};
    if (!db.settings.nishiStock || typeof db.settings.nishiStock !== 'object') db.settings.nishiStock = {};
    if (!db.supply || typeof db.supply !== 'object') db.supply = {};
    if (!db.daily || typeof db.daily !== 'object') db.daily = {};

    if (Array.isArray(db.settings.supplyProducts) && db.settings.supplyProducts.length > 0) {
      db.settings.supplyProducts.forEach(function (p) {
      if (!db.supply[p]) db.supply[p] = defSupplyRow();
      else {
        if (db.supply[p].nishiReplenish == null) db.supply[p].nishiReplenish = 0;
        if (db.supply[p].sokoReplenish == null) db.supply[p].sokoReplenish = 0;
        if (db.supply[p].nishiReplenishTotal == null) db.supply[p].nishiReplenishTotal = (db.supply[p].cumeWestTransfer != null ? Number(db.supply[p].cumeWestTransfer) || 0 : 0);
        if (db.supply[p].sokoReplenishTotal == null) db.supply[p].sokoReplenishTotal = (db.supply[p].cumeSokoInbound != null ? Number(db.supply[p].cumeSokoInbound) || 0 : 0);
      }
      });
    }
    if (Array.isArray(db.settings.dailyProducts) && db.settings.dailyProducts.length > 0) {
      db.settings.dailyProducts.forEach(function (p) {
      if (!db.daily[p]) db.daily[p] = defDailyRow();
      else {
        if (db.daily[p].deliveryCount == null) db.daily[p].deliveryCount = 0;
        if (db.daily[p].minamiIssued == null) db.daily[p].minamiIssued = 0;
        if (db.daily[p].sokoReplenish == null) db.daily[p].sokoReplenish = 0;
        if (db.daily[p].deliveryTotal == null) db.daily[p].deliveryTotal = 0;
        if (db.daily[p].minamiIssuedTotal == null) db.daily[p].minamiIssuedTotal = 0;
        if (db.daily[p].sokoReplenishTotal == null) db.daily[p].sokoReplenishTotal = (db.daily[p].cumeSokoInbound != null ? Number(db.daily[p].cumeSokoInbound) || 0 : 0);
      }
      });
    }
    [db.settings.supplyProducts, db.settings.dailyProducts].forEach(function (arr) {
      if (!Array.isArray(arr) || arr.length === 0) return;
      arr.forEach(function (p) {
        if (!db.settings.sokoStock[p]) db.settings.sokoStock[p] = defStockRow();
      });
    });
    if (Array.isArray(db.settings.supplyProducts) && db.settings.supplyProducts.length > 0) {
      db.settings.supplyProducts.forEach(function (p) {
        if (!db.settings.nishiStock[p]) db.settings.nishiStock[p] = defStockRow();
      });
    }
  }

  function patStockNishi(p) {
    ensureProductRows();
    var ns = db.settings.nishiStock[p] || defStockRow();
    var s = db.supply[p] || defSupplyRow();
    var nAll = sumSuppliesAllTime(LS_KAIGO_NISHI, [p])[p] != null ? sumSuppliesAllTime(LS_KAIGO_NISHI, [p])[p] : 0;
    return ns.initial - nAll + (Number(s.nishiReplenishTotal) || 0);
  }

  function patStockSoko(p) {
    ensureProductRows();
    var sk = db.settings.sokoStock[p] || defStockRow();
    var s = db.supply[p] || defSupplyRow();
    var mAll = sumSuppliesAllTime(LS_KAIGO_MINAMI, [p])[p] != null ? sumSuppliesAllTime(LS_KAIGO_MINAMI, [p])[p] : 0;
    var inTransitToNishi = Number(s.nishiReplenish) || 0;
    return sk.initial - (Number(s.nishiReplenishTotal) || 0) - inTransitToNishi - mAll + (Number(s.sokoReplenishTotal) || 0);
  }

  function dailySoko(p) {
    ensureProductRows();
    var sk = db.settings.sokoStock[p] || defStockRow();
    var d = db.daily[p] || defDailyRow();
    return sk.initial
      - ((Number(d.deliveryTotal) || 0) + (Number(d.deliveryCount) || 0))
      - ((Number(d.minamiIssuedTotal) || 0) + (Number(d.minamiIssued) || 0))
      + ((Number(d.sokoReplenishTotal) || 0) + (Number(d.sokoReplenish) || 0));
  }

  function statusFromSokoStock(p) {
    var st = (db.settings.sokoStock[p] && db.settings.sokoStock[p].warnAt != null) ? db.settings.sokoStock[p].warnAt : 10;
    var dg = (db.settings.sokoStock[p] && db.settings.sokoStock[p].dangerAt != null) ? db.settings.sokoStock[p].dangerAt : 5;
    var soko = 0;
    if (db.settings.dailyProducts.indexOf(p) >= 0) {
      soko = dailySoko(p);
    } else {
      soko = patStockSoko(p);
    }
    if (soko <= dg) return { k: 'danger', label: '!!緊急' };
    if (soko <= st) return { k: 'warn', label: '⚠要補充' };
    return { k: 'ok', label: '正常' };
  }

  function badgeClass(k) {
    if (k === 'danger') return 'badge badge-danger';
    if (k === 'warn') return 'badge badge-warn';
    if (k === 'ship') return 'badge badge-ship';
    return 'badge badge-ok';
  }

  function nowStamp() {
    var n = new Date();
    return n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0') + ' ' +
      String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  }

  function payloadForGAS(opts) {
    var includeSettings = !!(opts && opts.includeSettings);
    var payload = {
      token: token,
      sender: getSender() || '未記入',
      sentAt: nowStamp(),
      supply: db.supply,
      daily: db.daily
    };
    if (includeSettings) payload.settings = db.settings;
    var toilet = payload.daily && payload.daily['トイレットペーパー'];
    gasLog('POST daily トイレットペーパー', toilet ? {
      nishiOrder: toilet.nishiOrder,
      nishiOrderDate: toilet.nishiOrderDate
    } : 'なし');
    return payload;
  }

  function parseGas(text) {
    try {
      var j = JSON.parse(text);
      if (typeof j === 'string') { try { j = JSON.parse(j); } catch (e1) {} }
      return j;
    } catch (e) { return { _raw: text }; }
  }

  function mergeFromServer(d) {
    if (!d || typeof d !== 'object') return;
    if (d.settings && typeof d.settings === 'object' && Object.keys(d.settings).length > 0) {
      if (!db.settings || typeof db.settings !== 'object') db.settings = {};
      if (!Array.isArray(db.settings.supplyProducts)) db.settings.supplyProducts = [];
      if (!Array.isArray(db.settings.dailyProducts)) db.settings.dailyProducts = [];
      if (!Array.isArray(d.settings.supplyProducts) || d.settings.supplyProducts.length === 0) {
        d.settings.supplyProducts = db.settings.supplyProducts;
      }
      if (!Array.isArray(d.settings.dailyProducts) || d.settings.dailyProducts.length === 0) {
        d.settings.dailyProducts = db.settings.dailyProducts;
      }
      db.settings = d.settings;
    }
    if (d.supply && typeof d.supply === 'object') {
      db.supply = d.supply;
    }
    if (d.daily && typeof d.daily === 'object') {
      db.daily = d.daily;
    }
    if (d.lastSynced) db.lastSynced = String(d.lastSynced);
    if (d.lastSyncedBy) db.lastSyncedBy = String(d.lastSyncedBy);
  }

  function resolveGASBody(o) {
    if (!o || typeof o !== 'object') return o;
    if (o.data && typeof o.data === 'object' && (o.data.settings || o.data.supply || o.data.daily)) return o.data;
    if (o.body && typeof o.body === 'object' && (o.body.settings || o.body.supply || o.body.daily)) return o.body;
    if (o.payload && typeof o.payload === 'object') return o.payload;
    if (o.result && typeof o.result === 'object') return o.result;
    return o;
  }

  function postGAS(opts) {
    console.log('postGAS直前 db.daily トイレットペーパー:', db.daily && db.daily['トイレットペーパー'] ? {
      nishiOrder: db.daily['トイレットペーパー'].nishiOrder,
      nishiOrderDate: db.daily['トイレットペーパー'].nishiOrderDate
    } : 'なし');
    var payload = payloadForGAS(opts);
    gasLog('POST 送信', payload);
    return fetch(gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      redirect: 'follow',
      mode: 'cors'
    })
      .then(function (r) {
        return r.text().then(function (text) { return { ok: r.ok, status: r.status, text: text }; });
      })
      .then(function (x) {
        console.log('POST response:', x.text);
        var preview = x.text;
        if (preview && preview.length > 4000) preview = preview.slice(0, 4000) + '…(truncated)';
        gasLog('POST 応答 ' + x.status, preview, x);
        if (!x.ok) throw new Error('POST HTTP ' + x.status);
        return x.text;
      })
      .then(function (text) {
        if (isPostAlertDebugOn()) {
          if (!(opts && opts.skipSuccessAlert)) {
            alert((opts && opts.successAlertText) ? String(opts.successAlertText) : '保存しました');
          }
        }
        return text;
      })
      .catch(function (err) {
        console.error('POST error:', err);
        if (isPostAlertDebugOn()) {
          alert('送信失敗: ' + String(err));
        }
        throw err;
      });
  }

  var settingsSyncTimer = null;
  function scheduleSettingsSync(reason) {
    if (settingsSyncTimer) clearTimeout(settingsSyncTimer);
    settingsSyncTimer = setTimeout(function () {
      settingsSyncTimer = null;
      gasLog('設定同期POST', reason || 'settings');
      postGAS({ includeSettings: true })
        .then(function () {
          var info = document.getElementById('honbu-info');
          if (info) info.textContent = '設定をGASへ同期: ' + nowStamp();
        })
        .catch(function (e) {
          var err = document.getElementById('honbu-err');
          if (err) { err.textContent = '設定同期エラー: ' + String(e); err.hidden = false; }
        });
    }, 700);
  }

  var operationalSyncTimer = null;
  function scheduleOperationalSync(reason) {
    if (operationalSyncTimer) clearTimeout(operationalSyncTimer);
    operationalSyncTimer = setTimeout(function () {
      operationalSyncTimer = null;
      gasLog('運用入力同期POST', reason || 'ops-input');
      postGAS({ skipSuccessAlert: true })
        .then(function () {
          var info = document.getElementById('honbu-info');
          if (info) info.textContent = '入力をGASへ同期: ' + nowStamp();
        })
        .catch(function (e) {
          var err = document.getElementById('honbu-err');
          if (err) { err.textContent = '入力同期エラー: ' + String(e); err.hidden = false; }
        });
    }, 700);
  }

  function getGAS() {
    return fetch(gasUrl + '?token=' + encodeURIComponent(token) + '&ts=' + Date.now(), {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow'
    });
  }

  function processGetResponse(t, fromLabel) {
    var preview = t;
    if (preview && preview.length > 4000) preview = preview.slice(0, 4000) + '…(truncated)';
    gasLog((fromLabel || 'GET 受信') + ' raw', preview, { len: t ? t.length : 0 });
    var o = parseGas(t);
    gasLog((fromLabel || 'GET 受信') + ' parseGas', o);
    var body = resolveGASBody(o);
    gasLog((fromLabel || 'GET 受信') + ' resolveGASBody', body);
    mergeFromServer(body);
    if (o && o.lastSynced) db.lastSynced = o.lastSynced;
    if (o && o.lastSyncedBy) db.lastSyncedBy = o.lastSyncedBy;
    if (body && body.lastSynced) db.lastSynced = body.lastSynced;
    if (body && body.lastSyncedBy) db.lastSyncedBy = body.lastSyncedBy;
    gasLog('受信反映後 local db', { settings: db.settings, supply: db.supply, daily: db.daily, lastSynced: db.lastSynced, lastSyncedBy: db.lastSyncedBy });
  }

  function renderStamp() {
    var el = document.getElementById('honbu-stamp');
    if (db.lastSynced && db.lastSyncedBy) {
      el.textContent = '最終更新: ' + db.lastSyncedBy + ' ／ ' + db.lastSynced;
    } else {
      el.textContent = '最終更新: なし';
    }
  }

  function findHonbuDailyTrByProduct(p) {
    var tb = document.getElementById('honbu-daily-tbody');
    if (!tb) return null;
    var inps = tb.querySelectorAll('input.h-dv');
    for (var i = 0; i < inps.length; i++) {
      if (inps[i].getAttribute('data-p') === p) {
        var tr = inps[i].closest('tr');
        return tr || null;
      }
    }
    return null;
  }
  function updateHonbuDailySokoForProduct(p) {
    var tr = findHonbuDailyTrByProduct(p);
    if (!tr) return;
    ensureProductRows();
    if (!db.daily[p]) db.daily[p] = defDailyRow();
    var sk2 = dailySoko(p);
    var stD = statusFromSokoStock(p);
    if (tr.cells[5]) tr.cells[5].textContent = sk2 != null && !isNaN(sk2) ? String(Math.round(sk2 * 100) / 100) : '—';
    if (tr.cells[8]) tr.cells[8].innerHTML = '<span class="' + badgeClass(stD.k) + '">' + stD.label + '</span>';
  }

    dtb.innerHTML = '';

      var wk = patStockNishi(p);
      var sko = patStockSoko(p);
      var nWeek = allN[p] != null ? allN[p] : 0;
      var mAll = allM[p] != null ? allM[p] : 0;
      gasLog('stock calc ' + p, { nishiStock: wk, sokoStock: sko, nishiConsumedAll: nWeek, minamiConsumedAll: mAll });
      var stH = statusFromSokoStock(p);

      tr.cells[3].querySelector('input').setAttribute('data-p', p);
      tr.cells[4].textContent = String(mAll);
      tr.cells[5].textContent = sko != null && !isNaN(sko) ? String(Math.round(sko * 100) / 100) : '—';
      tr.cells[6].innerHTML = '<input type="number" min="0" step="any" class="h-sr" data-p="" style="width:4.5rem" />';
      tr.cells[6].querySelector('input').value = s.sokoReplenish != null && s.sokoReplenish !== '' ? s.sokoReplenish : '';

      tr.cells[8].innerHTML = '<span class="' + badgeClass(stH.k) + '">' + stH.label + '</span>';
      ptb.appendChild(tr);
    });

    db.settings.dailyProducts.forEach(function (p) {
      if (!db.daily[p]) db.daily[p] = defDailyRow();
      var d0 = db.daily[p];
      var sk2 = dailySoko(p);
      var stD = statusFromSokoStock(p);
      var tr2 = document.createElement('tr');
      tr2.innerHTML =
        '<td></td><td class="num col-west"></td><td class="col-west"></td><td class="num"></td>' +
        '<td class="num col-south col-divide"></td><td class="num col-soko"></td><td class="col-soko"></td><td></td><td></td>';
      tr2.cells[0].textContent = p;
      tr2.cells[1].textContent = String(d0.nishiOrder != null ? d0.nishiOrder : 0);
      tr2.cells[2].textContent = d0.nishiOrderDate || '—';
      tr2.cells[3].innerHTML = '<input type="number" min="0" step="any" class="h-dv" data-p="" style="width:4.5rem" />';
      tr2.cells[3].querySelector('input').value = d0.deliveryCount != null ? d0.deliveryCount : '';
      tr2.cells[3].querySelector('input').setAttribute('data-p', p);
      tr2.cells[4].innerHTML = '<input type="number" min="0" step="any" class="h-mi" data-p="" style="width:4.5rem" />';
      tr2.cells[4].querySelector('input').value = d0.minamiIssued != null ? d0.minamiIssued : '';
      tr2.cells[4].querySelector('input').setAttribute('data-p', p);
      tr2.cells[5].textContent = sk2 != null && !isNaN(sk2) ? String(Math.round(sk2 * 100) / 100) : '—';
      tr2.cells[6].innerHTML = '<input type="number" min="0" step="any" class="h-dsr" data-p="" style="width:4.5rem" />';
      tr2.cells[6].querySelector('input').value = d0.sokoReplenish != null && d0.sokoReplenish !== '' ? d0.sokoReplenish : '';
      tr2.cells[6].querySelector('input').setAttribute('data-p', p);
      var b2 = document.createElement('button');
      b2.type = 'button';
      b2.className = 'btn';
      b2.textContent = '受取';
      b2.setAttribute('data-act', 'hon-daily');
      b2.setAttribute('data-p', p);
      tr2.cells[7].appendChild(b2);
      tr2.cells[8].innerHTML = '<span class="' + badgeClass(stD.k) + '">' + stD.label + '</span>';
      dtb.appendChild(tr2);
    });
    document.querySelectorAll('.h-nr').forEach(function (inp) {
      inp.addEventListener('input', function () {
        var pr = inp.getAttribute('data-p');
        if (!db.supply[pr]) return;
        db.supply[pr].nishiReplenish = inp.value === '' ? 0 : parseFloat(inp.value);
        if (isNaN(db.supply[pr].nishiReplenish)) db.supply[pr].nishiReplenish = 0;
        saveDb();
        renderNishi();
        renderHonbu();
        scheduleOperationalSync('honbu-nishi-replenish');
      });

    document.querySelectorAll('.h-sr').forEach(function (inp) {
      inp.addEventListener('input', function () {
        var pr = inp.getAttribute('data-p');
        if (!db.supply[pr]) return;
        db.supply[pr].sokoReplenish = inp.value === '' ? 0 : parseFloat(inp.value);
        if (isNaN(db.supply[pr].sokoReplenish)) db.supply[pr].sokoReplenish = 0;
        saveDb();
        renderHonbu();
        scheduleOperationalSync('honbu-soko-replenish');
      });

        var pr = inp.getAttribute('data-p');
        if (!pr) return;
        if (!db.daily[pr]) db.daily[pr] = defDailyRow();
        db.daily[pr].deliveryCount = inp.value === '' ? 0 : parseFloat(inp.value);
        if (isNaN(db.daily[pr].deliveryCount)) db.daily[pr].deliveryCount = 0;
      }
      function postDeliveryCommit() {
        var now = Date.now();
        if (now - (inp._lastDdvGAS || 0) < 450) return;
        inp._lastDdvGAS = now;
        syncDeliveryFromInp();
        var pr = inp.getAttribute('data-p');
        var sen = getSender() || '未記入';
        db.lastSynced = nowStamp();
        db.lastSyncedBy = sen;
        saveDb();
        var v = inp.value;
        var shouldAlert = !(v === '' || Number(v) === 0);
        return postGAS({ successAlertText: '保存しました', skipSuccessAlert: !shouldAlert })
          .then(function () {
            renderHonbu();
            renderNishi();
            var info = document.getElementById('honbu-info');
            if (info) info.textContent = 'GAS 送信（本部・納品数）: ' + nowStamp();
          });
      }
      var skipBlur = false;
      inp.addEventListener('input', function () {
        var pr = inp.getAttribute('data-p');
        if (!pr) return;
        syncDeliveryFromInp();
        saveDb();
        updateHonbuDailySokoForProduct(pr);
        renderNishi();
      });
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          skipBlur = true;
          postDeliveryCommit();
          setTimeout(function () { skipBlur = false; }, 100);
        }
      });
      inp.addEventListener('change', function () {
        postDeliveryCommit();
      });
      inp.addEventListener('blur', function () {
        if (skipBlur) return;
        postDeliveryCommit();
      });
    });
    document.querySelectorAll('.h-mi').forEach(function (inp) {
      inp.addEventListener('input', function () {
        var pr = inp.getAttribute('data-p');
        if (!db.daily[pr]) return;
        db.daily[pr].minamiIssued = inp.value === '' ? 0 : parseFloat(inp.value);
        if (isNaN(db.daily[pr].minamiIssued)) db.daily[pr].minamiIssued = 0;
        saveDb();
        renderHonbu();
        scheduleOperationalSync('honbu-minami-issued');
      });
    });
    document.querySelectorAll('.h-dsr').forEach(function (inp) {

        var pr = inp.getAttribute('data-p');
        if (!db.daily[pr]) return;
        db.daily[pr].sokoReplenish = inp.value === '' ? 0 : parseFloat(inp.value);
        if (isNaN(db.daily[pr].sokoReplenish)) db.daily[pr].sokoReplenish = 0;
        saveDb();
        renderHonbu();
        scheduleOperationalSync('honbu-daily-soko-replenish');
      });
    });
  }

    if (!sen) { alert('操作者名を入力してください。'); return; }
    ensureProductRows();
    var s = db.supply[p];
    var a = s.nishiReplenish > 0 ? s.nishiReplenish : 0;
    var b = s.sokoReplenish > 0 ? s.sokoReplenish : 0;
    if (a > 0) { s.nishiReplenishTotal = (Number(s.nishiReplenishTotal) || 0) + a; s.nishiReplenish = 0; }
    if (b > 0) { s.sokoReplenishTotal = (Number(s.sokoReplenishTotal) || 0) + b; s.sokoReplenish = 0; }
    db.lastSynced = nowStamp();
    db.lastSyncedBy = sen;
    saveDb();
    return postGAS()
      .then(function () { renderHonbu(); renderNishi(); document.getElementById('honbu-info').textContent = 'GAS 送信（本部・パット確認）'; });

    if (!db.daily[p]) db.daily[p] = defDailyRow();

    d0.deliveryCount = 0;
    d0.minamiIssued = 0;
    d0.sokoReplenish = 0;

      tr2.cells[0].textContent = p;
      var sel = document.createElement('select');
      sel.setAttribute('data-p', p);
      for (var o = 0; o <= 30; o++) {
        var op = document.createElement('option');
        op.value = o;
        op.textContent = o;
        if (Number(d0.nishiOrder) === o) op.selected = true;
        sel.appendChild(op);
      }
      tr2.cells[1].appendChild(sel);
      tr2.cells[2].textContent = d0.nishiOrderDate || '—';
      tr2.cells[3].innerHTML = '';
      var b1 = document.createElement('button');
      b1.className = 'btn';
      b1.textContent = '発注';
      b1.setAttribute('data-act', 'n-ord');
      b1.setAttribute('data-p', p);
      var b2 = document.createElement('button');
      b2.className = 'btn btn-ghost';
      b2.textContent = '受取';
      b2.setAttribute('data-act', 'n-daily-reset');
      b2.setAttribute('data-p', p);
      tr2.cells[3].appendChild(b1);
      tr2.cells[3].appendChild(document.createTextNode(' '));
      tr2.cells[3].appendChild(b2);
      {
        var dc = Number(d0.deliveryCount) || 0;
        var no = Number(d0.nishiOrder) || 0;
        if (dc > 0) {
          tr2.cells[4].innerHTML = '<span class="' + badgeClass('ship') + '">配送中</span>';
        } else if (no > 0) {
          tr2.cells[4].innerHTML = '<span class="badge badge-ok">発注済</span>';
        } else { tr2.cells[4].textContent = '—'; }
      }
      dtb.appendChild(tr2);
    });
  }

  function doNishiPatConfirm(p) {
    var sen = getSender();
    if (!sen) { alert('操作者名（本部上部）を入力してください。'); return; }
    if (!db.supply[p]) return;
    var s = db.supply[p];
    if (Number(s.nishiReplenish) <= 0) return;
    s.nishiReplenish = 0;
    db.lastSynced = nowStamp();
    db.lastSyncedBy = sen;
    saveDb();
    return postGAS().then(function () { renderNishi(); renderHonbu(); document.getElementById('honbu-info').textContent = 'GAS 送信（西・パット受取）'; });
  }

  function doNishiPatOrder(p) {
    if (!getSender()) { alert('操作者名を上部に入力'); return; }
    ensureProductRows();
    if (!db.supply[p]) db.supply[p] = defSupplyRow();
    db.lastSynced = nowStamp();
    db.lastSyncedBy = getSender() || '未記入';
    saveDb();
    return postGAS().then(function () {
      renderNishi();
      renderHonbu();
      document.getElementById('honbu-info').textContent = 'GAS 送信（西・パット発注）';
    });
  }

  function doNishiOrder(p, qty) {
    if (!getSender()) { alert('操作者名を上部に入力'); return; }
    if (!db.daily[p]) db.daily[p] = defDailyRow();
    db.daily[p].nishiOrder = parseInt(qty, 10) || 0;
    db.daily[p].nishiOrderDate = ymd(new Date());
    if (p === 'トイレットペーパー') {
      console.log('doNishiOrder更新後 トイレットペーパー:', { nishiOrder: db.daily[p].nishiOrder, nishiOrderDate: db.daily[p].nishiOrderDate });
    }
    saveDb();
    return postGAS().then(function () { renderNishi(); renderHonbu(); });
  }

  function doNishiDailyReset(p) {
    if (!getSender()) { alert('操作者名を上部に入力'); return; }
    if (db.daily[p]) {
      db.daily[p].nishiOrder = 0;
      db.daily[p].nishiOrderDate = '';
    }
    if (p === 'トイレットペーパー') {
      console.log('doNishiDailyReset実行 トイレットペーパー:', db.daily[p] ? { nishiOrder: db.daily[p].nishiOrder, nishiOrderDate: db.daily[p].nishiOrderDate } : 'なし');
    }
    saveDb();
    return postGAS().then(function () { renderNishi(); renderHonbu(); });
  }

  function doNishiOrderAll() {
    if (!getSender()) { alert('操作者名を上部に入力'); return; }
    ensureProductRows();
    var changed = [];
    var today = ymd(new Date());
    db.settings.dailyProducts.forEach(function (p) {
      if (!db.daily[p]) db.daily[p] = defDailyRow();
      var sel = document.querySelector('#n-daily-tbody select[data-p="' + p + '"]');
      if (!sel) return;
      var qty = parseInt(sel.value, 10) || 0;
      db.daily[p].nishiOrder = qty;
      db.daily[p].nishiOrderDate = qty > 0 ? today : '';
      if (qty > 0) changed.push({ product: p, qty: qty, date: db.daily[p].nishiOrderDate });
    });
    console.log('一括発注の内容', changed);
    if (!changed.length) {
      alert('発注数が0のため送信しません。');
      renderNishi();
      return;
    }
    var msg = '一括発注の内容\n' + changed.map(function (x) { return x.product + ': ' + x.qty + ' (' + x.date + ')'; }).join('\n');
    alert(msg);
    db.lastSynced = nowStamp();
    db.lastSyncedBy = getSender() || '未記入';
    saveDb();
    return postGAS().then(function () { renderNishi(); renderHonbu(); });
  }

  document.getElementById('panel-honbu').addEventListener('click', function (e) {
    console.log('確認ボタン押下');
    var t = e.target;
    if (t.getAttribute('data-act') === 'hon-pat') { doHonbuPatConfirm(t.getAttribute('data-p')); }
    if (t.getAttribute('data-act') === 'hon-daily') { doHonbuDailyConfirm(t.getAttribute('data-p')); }
  });
  document.getElementById('panel-nishi').addEventListener('change', function (e) {
    if (e.target && e.target.tagName === 'SELECT' && e.target.getAttribute('data-p')) {
      if (!getSender()) { e.target.value = 0; alert('操作者名（本部上部）を入力してから発注数を選んでください'); return; }
    }
  });
  document.getElementById('n-order-all').addEventListener('click', function () {
    doNishiOrderAll();
  });
  document.getElementById('panel-nishi').addEventListener('click', function (e) {
    console.log('確認ボタン押下');
    var t = e.target;
    if (t.getAttribute('data-act') === 'n-pat-order') { doNishiPatOrder(t.getAttribute('data-p')); }
    if (t.getAttribute('data-act') === 'n-pat') { doNishiPatConfirm(t.getAttribute('data-p')); }
    if (t.getAttribute('data-act') === 'n-ord') { var p0 = t.getAttribute('data-p'); var s0 = document.querySelector('select[data-p="' + p0 + '"]'); doNishiOrder(p0, s0 ? s0.value : 0); }
    if (t.getAttribute('data-act') === 'n-daily-reset') { doNishiDailyReset(t.getAttribute('data-p')); }
  });

  document.getElementById('n-week-prev').addEventListener('click', function () {
    weekMonday = addDays(weekMonday, -7);
    try { localStorage.setItem('zaiko_week_mon', ymd(weekMonday)); } catch (e) {}
    renderNishi();
  });
  document.getElementById('n-week-next').addEventListener('click', function () {
    weekMonday = addDays(weekMonday, 7);
    try { localStorage.setItem('zaiko_week_mon', ymd(weekMonday)); } catch (e) {}
    renderNishi();
  });

  function activateTab(n) {
    document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.toggle('active', b.getAttribute('data-tab') === n); });
    document.querySelectorAll('.panel').forEach(function (p) { p.classList.toggle('active', p.getAttribute('data-panel') === n); });
    if (n === 'honbu') renderHonbu();
    if (n === 'nishi') renderNishi();
    if (n === 'settei') renderSettingsFull();
  }
  document.querySelectorAll('.tab-btn').forEach(function (b) { b.addEventListener('click', function () { activateTab(b.getAttribute('data-tab')); }); });

  document.getElementById('btn-sync-get').addEventListener('click', function () {
    console.log('取得ボタン押下');
    var el = document.getElementById('honbu-err');
    el.hidden = true;
    getGAS()
      .then(function (r) { return r.text(); })
      .then(function (t) {
        processGetResponse(t, '手動GET');
        saveDb();
        renderStamp();
        renderHonbu();
        document.getElementById('honbu-info').textContent = 'GAS から取り込み: ' + nowStamp();
      })
      .catch(function (e) { el.textContent = String(e); el.hidden = false; });
  });

  function onSettingsInput(e) {
    if (e.target && e.target.classList && e.target.classList.contains('s-n')) {
      var k = e.target.getAttribute('data-k');
      var p = e.target.getAttribute('data-p');
      var f = e.target.getAttribute('data-f');
      if (!k || !p || !f) return;
      if (!db.settings[k][p]) db.settings[k][p] = defStockRow();
      db.settings[k][p][f] = e.target.value === '' ? 0 : parseFloat(e.target.value);
      if (isNaN(db.settings[k][p][f])) db.settings[k][p][f] = 0;
      saveDb();
      renderHonbu();
      renderNishi();
      scheduleSettingsSync('stock-input');
    }
  }
  (function bindSettingsInputOnce() {
    var r = document.getElementById('settings-root');
    r.addEventListener('input', onSettingsInput);
  })();

  function renderSettingsFull() {
    var root = document.getElementById('settings-root');
    ensureProductRows();
    var html = '';
    html += '<h2>施設名</h2><p><input type="text" id="s-fac2" class="s-f" style="min-width: 18rem" value="' + escapeAttr(db.settings.facilityName) + '" /></p>';
    html += '<h2>パット品目管理 <button type="button" class="btn btn-ghost" id="imp2">介護記録から取得</button> <input id="new-p" placeholder="追加" /> <button type="button" class="btn" id="add-p">追加</button></h2><ul id="l-p" class="slist"></ul>';
    html += '<h2>日用品品目管理 <input id="new-d" placeholder="追加" /> <button type="button" class="btn" id="add-d">追加</button></h2><ul id="l-d" class="slist"></ul>';
    html += '<h2>1. 倉庫（パット類在庫設定）</h2><div class="table-wrap" id="tb-soko-p"></div>';
    html += '<h2>2. 倉庫（日用品在庫設定）</h2><div class="table-wrap" id="tb-soko-d"></div>';
    html += '<h2>3. 西（パット類在庫設定）</h2><div class="table-wrap" id="tb-nishi-p"></div>';
    html += '<h2>4. 西（日用品在庫設定）</h2><div class="table-wrap" id="tb-nishi-d"></div>';
    html += '<h2>GAS 連携</h2>' +
      '<p><label for="s-gas-url">GAS URL（Webアプリ /exec）</label><br />' +
      '<input type="text" id="s-gas-url" autocomplete="off" style="width:100%;max-width:46rem" value="' + escapeAttr(gasUrl) + '" /></p>' +
      '<p><label for="s-gas-token">トークン</label><br />' +
      '<input type="text" id="s-gas-token" autocomplete="off" style="width:100%;max-width:28rem" value="' + escapeAttr(token) + '" /></p>' +
      '<p><button type="button" class="btn" id="s-gas-save">保存</button> <span id="s-gas-msg" class="ok-msg"></span></p>' +
      '<p class="meta-line">未入力で保存すると、上記の初期値（フォールバック）が使われます。</p>' +
      '<h2>デバッグ</h2>' +
      '<p class="meta-line"><label><input type="checkbox" id="s-post-alert-debug" ' + (isPostAlertDebugOn() ? 'checked' : '') + ' /> POST結果をアラート表示（Safari等でコンソールが開けない端末向け）</label></p>';
    root.innerHTML = html;
    (function () {
      function fillSt(tableId, arr, nskey) {
        var d = document.getElementById(tableId);
        var t = '<table><thead><tr><th>品目</th><th>初期</th><th>要補充</th><th>緊急</th></tr></thead><tbody>';
        arr.forEach(function (p) {
          var o = (db.settings[nskey] && db.settings[nskey][p]) || defStockRow();
          t += '<tr><td>' + escapeText(p) + '</td>' +
            '<td><input class="s-n" data-k="' + nskey + '" data-p="' + escapeAttr(p) + '" data-f="initial" type="number" value="' + o.initial + '"/></td>' +
            '<td><input class="s-n" data-k="' + nskey + '" data-p="' + escapeAttr(p) + '" data-f="warnAt" type="number" value="' + o.warnAt + '"/></td>' +
            '<td><input class="s-n" data-k="' + nskey + '" data-p="' + escapeAttr(p) + '" data-f="dangerAt" type="number" value="' + o.dangerAt + '"/></td></tr>';
        });
        t += '</tbody></table>';
        d.innerHTML = t;
      }
      function fillList(id, which) {
        var el = document.getElementById(id);
        if (!el) return;
        var arr = which === 'p' ? db.settings.supplyProducts : db.settings.dailyProducts;
        el.innerHTML = arr.map(function (p, i) {
          return '<li><span class="nm">' + escapeText(p) + '</span>' +
            '<button type="button" class="btn btn-ghost s-mv" data-w="' + which + '" data-ix="' + i + '" data-d="-1" title="上へ">↑</button>' +
            '<button type="button" class="btn btn-ghost s-mv" data-w="' + which + '" data-ix="' + i + '" data-d="1" title="下へ">↓</button>' +
            '<button type="button" class="btn btn-ghost s-rm" data-w="' + which + '" data-ix="' + i + '">削除</button></li>';
        }).join('');
      }
      fillList('l-p', 'p');
      fillList('l-d', 'd');
      fillSt('tb-soko-p', db.settings.supplyProducts, 'sokoStock');
      fillSt('tb-soko-d', db.settings.dailyProducts, 'sokoStock');
      fillSt('tb-nishi-p', db.settings.supplyProducts, 'nishiStock');
      fillSt('tb-nishi-d', db.settings.dailyProducts, 'nishiStock');
    })();
    var fac = document.getElementById('s-fac2');
    if (fac) {
      fac.oninput = function (e) {
        db.settings.facilityName = e.target.value;
        saveDb();
        var ft = document.getElementById('facilityTitle');
        if (ft) ft.textContent = e.target.value || '在庫管理';
        scheduleSettingsSync('facility-name');
      };
    }
    var addP = document.getElementById('add-p');
    if (addP) {
      addP.onclick = function () {
        var v = (document.getElementById('new-p').value || '').trim();
        if (!v || db.settings.supplyProducts.indexOf(v) >= 0) return;
        db.settings.supplyProducts.push(v);
        ensureProductRows();
        saveDb();
        renderSettingsFull();
        renderHonbu();
        renderNishi();
        scheduleSettingsSync('add-supply-product');
      };
    }
    var addD = document.getElementById('add-d');
    if (addD) {
      addD.onclick = function () {
        var v2 = (document.getElementById('new-d').value || '').trim();
        if (!v2 || db.settings.dailyProducts.indexOf(v2) >= 0) return;
        db.settings.dailyProducts.push(v2);
        ensureProductRows();
        saveDb();
        renderSettingsFull();
        renderHonbu();
        renderNishi();
        scheduleSettingsSync('add-daily-product');
      };
    }
    var im = document.getElementById('imp2');
    if (im) im.onclick = doImport;
    var gasSave = document.getElementById('s-gas-save');
    if (gasSave) {
      gasSave.onclick = function () {
        saveGasEndpoints();
        var msg = document.getElementById('s-gas-msg');
        if (msg) msg.textContent = 'GAS URL・トークンを保存しました。';
        setTimeout(function () { if (msg) msg.textContent = ''; }, 3500);
        scheduleSettingsSync('gas-endpoint-save');
      };
    }
    var postAlertDbg = document.getElementById('s-post-alert-debug');
    if (postAlertDbg) {
      postAlertDbg.onchange = function () {
        try { localStorage.setItem(LS_POST_ALERT_DEBUG, postAlertDbg.checked ? '1' : '0'); } catch (e) {}
      };
    }
    var lp = document.getElementById('l-p');
    function listRowClick(e) {
        var t = e.target;
        if (!t || !t.classList) return;
        if (!t.classList.contains('s-mv') && !t.classList.contains('s-rm')) return;
        if (t.classList.contains('s-mv')) {
          var w0 = t.getAttribute('data-w');
          var ix0 = parseInt(t.getAttribute('data-ix'), 10);
          var d0 = parseInt(t.getAttribute('data-d'), 10);
          var a0 = w0 === 'p' ? db.settings.supplyProducts : db.settings.dailyProducts;
          var nix = ix0 + d0;
          if (nix < 0 || nix >= a0.length) return;
          var u = a0[ix0];
          a0[ix0] = a0[nix];
          a0[nix] = u;
          saveDb();
          renderSettingsFull();
          scheduleSettingsSync('move-product');
        }
        if (t.classList.contains('s-rm')) {
          var w1 = t.getAttribute('data-w');
          var ix1 = parseInt(t.getAttribute('data-ix'), 10);
          var a1 = w1 === 'p' ? db.settings.supplyProducts : db.settings.dailyProducts;
          var pr = a1.splice(ix1, 1)[0];
          if (w1 === 'p') { delete db.supply[pr]; }
          else { delete db.daily[pr]; }
          saveDb();
          renderSettingsFull();
          renderHonbu();
          renderNishi();
          scheduleSettingsSync('remove-product');
        }
    }
    var ld = document.getElementById('l-d');
    if (lp) lp.onclick = listRowClick;
    if (ld) ld.onclick = listRowClick;
  }

  function doImport() {
    var found = null;
    [LS_KAIGO_NISHI, LS_KAIGO_MINAMI].forEach(function (k) {
      if (found && found.length) return;
      try {
        var raw = localStorage.getItem(k);
        if (!raw) return;
        var j = JSON.parse(raw);
        var cands = [
          j && j.settings && j.settings.supplyProducts,
          j && j.db && j.db.settings && j.db.settings && j.db.settings.supplyProducts,
          j && j.db && j.db.settings && j.db.settings.supplyProducts
        ];
        for (var i = 0; i < cands.length; i++) {
          if (Array.isArray(cands[i]) && cands[i].length) { found = cands[i].map(String); return; }
        }
      } catch (e) {}
    });
    if (!found || !found.length) {
      alert('介護記録 localStorage(kaigo_nishi / minami) から品目を取得できません。');
      return;
    }
    found.forEach(function (p) { if (db.settings.supplyProducts.indexOf(p) < 0) db.settings.supplyProducts.push(p); });
    ensureProductRows();
    saveDb();
    renderSettingsFull();
    renderHonbu();
    scheduleSettingsSync('import-products');
  }

  // Init
  (function init() {
    ensureProductRows();
    if (!document.getElementById('global-sender').value) document.getElementById('global-sender').value = localStorage.getItem('zaiko_global_sender') || '';
    document.getElementById('global-sender').addEventListener('input', function () { try { localStorage.setItem('zaiko_global_sender', document.getElementById('global-sender').value); } catch (e) {} });
    document.getElementById('facilityTitle').textContent = db.settings.facilityName;
    renderStamp();
    renderHonbu();
    getGAS()
      .then(function (r) { return r.text(); })
      .then(function (t) {
        processGetResponse(t, '起動時GET');
        saveDb();
        renderStamp();
        renderHonbu();
        renderNishi();
      })
      .catch(function () { renderNishi(); });
  })();
})();
  </script>
</body>
</html>
